# 类案检索助手 · 基础服务（Day0 §4.2）
# PostgreSQL + Redis；Chroma 走 .env 中的本地持久化目录，暂不起独立服务。
# 启动：docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: case_search_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: case_search
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d case_search"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: case_search_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
  redis_data:
