# Alembic 配置（Day0 §4.2）。Day 0 仅就位，迁移脚本待 Day 1 数据层。
[alembic]
script_location = alembic
prepend_sys_path = .
# 实际连接串由 alembic/env.py 从 app.core.config 读取（避免在此明文写库地址）
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
